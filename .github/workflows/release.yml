name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "バージョン上げ方"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "プレリリースとして公開する"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------
  # 1. package.json のバージョンを上げ、コミットし、タグを push
  # -----------------------------------------------------------
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version & tag
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          NEW_VERSION="${NEW_VERSION#v}"
          TAG="v${NEW_VERSION}"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          git add package.json
          if [ -f package-lock.json ]; then git add package-lock.json; fi
          git commit -m "chore: release ${TAG}"
          git tag "${TAG}"
          git push origin HEAD
          git push origin "${TAG}"

  # -----------------------------------------------------------
  # 2. macOS / Windows でバイナリをビルド
  # -----------------------------------------------------------
  build:
    needs: bump-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: mac
            build_script: dist:mac
          - os: windows-latest
            name: win
            build_script: dist:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
        shell: bash

      - name: Build (${{ matrix.name }})
        run: npm run ${{ matrix.build_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 署名用証明書を登録していない前提で自動検出を無効化
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.name }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: ignore
          retention-days: 7

  # -----------------------------------------------------------
  # 3. 成果物を集めて GitHub Release を作成
  # -----------------------------------------------------------
  release:
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.tag }}
          name: ${{ needs.bump-version.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          files: |
            artifacts/*.dmg
            artifacts/*.exe
            artifacts/*.zip
